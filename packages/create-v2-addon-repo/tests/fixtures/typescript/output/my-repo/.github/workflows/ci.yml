name: CI

on: 
  push:
    branches:
      - main
  pull_request:

env:
  NODE_VERSION: 22

jobs:
  get-test-matrix:
    name: Get test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-test-matrix.outputs.matrix }}
    timeout-minutes: 5
    steps:
      - name: Check out a copy of the repo
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: ${{ env.NODE_VERSION }}

      - id: set-test-matrix
        name: Set test matrix
        run: echo "matrix=$(pnpx @embroider/try list)" >> $GITHUB_OUTPUT
        working-directory: 'test-app'

  setup:
    name: Setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out a copy of the repo
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Upload built packages
        uses: actions/upload-artifact@v7
        with:
          name: built-packages
          include-hidden-files: true
          path: |
            packages/**/declarations/**/*
            packages/**/dist/**/*
            packages/.gitkeep

  lint:
    name: Lint
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out a copy of the repo
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download built packages
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Lint
        run: pnpm lint


  test:
    name: Test
    needs: [setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-location:
          - 'docs-app'
          - 'test-app'
    timeout-minutes: 5
    steps:
      - name: Check out a copy of the repo
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download built-packages
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Test
        run: pnpm test
        working-directory: ${{ matrix.package-location }}

  test-compatibility:
    needs: [get-test-matrix, setup]
    name: Test compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.get-test-matrix.outputs.matrix) }}
    timeout-minutes: 5
    steps:
      - name: Check out a copy of the repo
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: ${{ env.NODE_VERSION }}

      - name: Make file changes
        run: pnpx @embroider/try apply ${{ matrix.name }}
        working-directory: 'test-app'

      - name: Install dependencies
        run: pnpm install --no-lockfile

      - name: Download built-packages
        uses: actions/download-artifact@v8
        with:
          name: built-packages
          path: packages

      - name: Test
        env: ${{ matrix.env }}
        run: pnpm test
        working-directory: 'test-app'
